# Template: Venta AW730 AeroStyle Compact
# Integration: xZetsubou/hass-localtuya, Version 2025.11.0
# Tested Protocol: 3.4
# App: Smart Life (Tuya)
# Configuration notes:
# - DPs may vary slightly with firmware
# - If "Configure Entity" dialogue shows the error "expected int" just retype the values
#   manually and it will work
# Usage Notes:
# - Smart Life app should be closed during LocalTuya use
# - (de)activating of Hybrid mode won't show on device display, but works
# - Reset buttons don't work. Will retest once counters are zero. Might be removed in the future

- humidifier:
    entity_category: None
    humidifier_set_humidity_dp: '13'
    humidifier_current_humidity_dp: '14'
    humidifier_mode_dp: '24'
    min_humidity: 30
    max_humidity: 70
    humidifier_available_modes:
      normal: Manual
      automatic: Auto
      sleep: Sleep
    device_class: humidifier
    friendly_name: ''
    id: '1'
    platform: humidifier
    icon: ''
- sensor:
    friendly_name: Temperature
    entity_category: None
    unit_of_measurement: °C
